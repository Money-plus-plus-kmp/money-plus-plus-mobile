name: Changed Modules

on:
  workflow_call:
    outputs:
      modules:
        description: "Changed modules"
        value: ${{ jobs.detect.outputs.modules }}
      android_modules:
        description: "Changed Android modules (admin_panel excluded)"
        value: ${{ jobs.detect.outputs.android_modules }}
      has_changes:
        description: "If there are any changes"
        value: ${{ jobs.detect.outputs.has_changes }}
      ios_modules:
        description: "Changed iOS-capable modules"
        value: ${{ jobs.detect.outputs.ios_modules }}
      has_ios_changes:
        description: "If there are iOS app changes"
        value: ${{ jobs.detect.outputs.has_ios_changes }}
      test_modules:
        description: "Modules for testing (composeApp excluded)"
        value: ${{ jobs.detect.outputs.test_modules }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
      android_modules: ${{ steps.changes.outputs.android_modules }}
      ios_modules: ${{ steps.changes.outputs.ios_modules }}
      has_ios_changes: ${{ steps.changes.outputs.has_ios_changes }}
      test_modules: ${{ steps.changes.outputs.test_modules }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files-git
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine modules
        id: changes
        run: |
          ALL_MODULES_JSON=$(./gradlew exportModuleDeps --no-configuration-cache | grep -o '{.*}')
          echo "All modules JSON: $ALL_MODULES_JSON"

          CHANGED_FILES="${{ steps.changed-files-git.outputs.changed_files }}"
          ALL_MODULES='data domain presentation design_system composeApp'
          IOS_MODULES='data domain presentation design_system composeApp'

          UNIQUE_MODULE_LIST=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u)
          FINAL_MODULES=""

          for module in $UNIQUE_MODULE_LIST; do
            if [[ " $ALL_MODULES " =~ " $module " ]]; then
              FINAL_MODULES="$FINAL_MODULES $module"
              # Add dependent modules
              DEPS=$(echo "$ALL_MODULES_JSON" | jq -r --arg module "$module" '.[$module][]?' 2>/dev/null || true)
              for dep in $DEPS; do
                FINAL_MODULES="$FINAL_MODULES $dep"
              done
            fi
          done

          FINAL_MODULES=$(echo $FINAL_MODULES | tr ' ' '\n' | sort -u | tr '\n' ' ')
          ANDROID_JSON_ARRAY=$(echo "$FINAL_MODULES" | tr ' ' '\n' | grep -v '^admin_panel$' | jq -R -s -c 'split("\n")[:-1]')
          JSON_ARRAY=$(echo "$FINAL_MODULES" | jq -R 'split(" ") | map(select(length > 0))' | jq -c '.')
          IOS_JSON_ARRAY=$(echo "$FINAL_MODULES" | tr ' ' '\n' | grep -F -x -f <(echo "$IOS_MODULES" | tr ' ' '\n') | jq -R -s -c 'split("\n")[:-1]')
          TEST_JSON_ARRAY=$(echo "$JSON_ARRAY" | jq '[.[] | select(. != "composeApp")]')

          if [ "$(echo "$JSON_ARRAY" | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules<<EOF" >> $GITHUB_OUTPUT
            echo "$JSON_ARRAY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi
          
          echo "android_modules<<EOF" >> $GITHUB_OUTPUT
          echo "$ANDROID_JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "ios_modules<<EOF" >> $GITHUB_OUTPUT
          echo "$IOS_JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "test_modules<<EOF" >> $GITHUB_OUTPUT
          echo "$TEST_JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT